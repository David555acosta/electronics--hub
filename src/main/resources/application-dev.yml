spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spring
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  servlet:
    multipart:
      max-request-size: 20MB
      max-file-size: 10MB
  cache:
    type: simple
  #sql:
    #init:
      #mode: always
      #data-locations: classpath:data.sql
springdoc:
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true